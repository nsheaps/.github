---
# Example vault file for GitHub App credentials
# Copy to vault.yml and encrypt with: ansible-vault encrypt inventory/vault.yml
#
# Required for GitHub App authentication in CI
# For local development, set GITHUB_TOKEN environment variable instead

vault_github_app_id: "YOUR_APP_ID"
vault_github_installation_id: "YOUR_INSTALLATION_ID"
vault_github_private_key: |
  -----BEGIN RSA PRIVATE KEY-----
  YOUR_PRIVATE_KEY_HERE
  -----END RSA PRIVATE KEY-----
