---
# File Synchronization Playbook
#
# Syncs files from .github repo to target repositories.
# Central repository always trumps target repos.
# If target has modifications, opens PR in .github to preserve changes.
#
# Supports two modes per file:
#   - Exact copy (default): source file is copied as-is
#   - Template mode (template: true): source is rendered with Jinja2 per-repo vars
#
# Usage:
#   Local: export GITHUB_TOKEN=ghp_xxx && mise run sync-files
#   CI: Runs automatically via GitHub Actions

- name: Sync files to repositories
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../config/sync-files.yml"
  vars:
    templates_dir: "{{ playbook_dir }}/../templates"
    _dry_run: "{{ dry_run | default(false) }}"
    _force_sync: "{{ force_sync | default(false) }}"
    preserve_changes: "{{ defaults.preserve_target_changes | default(true) }}"
    commit_prefix: "{{ defaults.commit_message_prefix | default('[sync]') }}"

  tasks:
    - name: Authenticate with GitHub
      ansible.builtin.include_role:
        name: github_auth

    - name: Display configuration summary
      ansible.builtin.debug:
        msg: |
          File Sync Configuration:
            Files: {{ files | dict2items | selectattr('value.repos', 'defined') | selectattr('value.repos', '!=', []) | list | length }}
            Dry run: {{ _dry_run }}
            Force sync: {{ _force_sync }}
            Preserve target changes: {{ preserve_changes }}

    - name: Rebuild sync tasks properly
      ansible.builtin.set_fact:
        sync_tasks: []

    - name: Build sync tasks list
      ansible.builtin.set_fact:
        sync_tasks: >-
          {{
            sync_tasks + [{
              'source_path': item.key,
              'dest_path': item.value.dest | default(item.key),
              'repos': item.value.repos,
              'template': item.value.template | default(false)
            }]
          }}
      loop: "{{ files | dict2items | selectattr('value.repos', 'defined') | selectattr('value.repos', '!=', []) | list }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Display active sync tasks
      ansible.builtin.debug:
        msg: "Syncing {{ sync_tasks | length }} file(s) to target repositories"

    - name: Process each file sync
      ansible.builtin.include_role:
        name: file_sync
      vars:
        sync_file:
          source: "{{ item.source_path }}"
          dest: "{{ item.dest_path }}"
          repos: "{{ item.repos }}"
          template: "{{ item.template }}"
      loop: "{{ sync_tasks }}"
      loop_control:
        loop_var: item
        label: "{{ item.source_path }} → {{ item.repos | length }} repo(s)"
      when: sync_tasks | length > 0

    - name: Display completion
      ansible.builtin.debug:
        msg: "File synchronization complete!"
