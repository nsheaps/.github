---
# File Synchronization Task Definitions
#
# Each task defines:
#   - name: Human-readable task name
#   - source: Source file path (relative to ansible/templates/)
#   - dest: Destination path in target repositories
#   - repos: List of target repositories (org/repo format)
#   - state: present (create/update) or absent (delete)
#   - commit_message: (optional) Custom commit message
#
# For local development, set GITHUB_TOKEN environment variable
# For CI, configure GitHub App credentials in vault

# Global defaults (can be overridden per task)
defaults:
  state: present
  force_sync: false
  commit_message_prefix: "[sync]"

# Sync task definitions
sync_tasks:
  # Example: Sync shared CI workflow
  # - name: "Sync shared CI workflow"
  #   source: "workflows/shared-ci.yml"
  #   dest: ".github/workflows/ci.yml"
  #   state: present
  #   repos:
  #     - nsheaps/example-repo-1
  #     - nsheaps/example-repo-2

  # Example: Sync renovate configuration
  # - name: "Sync renovate configuration"
  #   source: "config/renovate.json"
  #   dest: "renovate.json"
  #   state: present
  #   repos:
  #     - nsheaps/example-repo-1

  # Example: Remove deprecated file
  # - name: "Remove deprecated security workflow"
  #   dest: ".github/workflows/deprecated-security.yml"
  #   state: absent
  #   repos:
  #     - nsheaps/example-repo-1

# Placeholder task (remove when adding real tasks)
  - name: "Placeholder - no sync tasks configured"
    source: "placeholder.txt"
    dest: ".github/.placeholder"
    state: present
    repos: []  # Empty list = no repos to sync
