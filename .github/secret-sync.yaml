# 1Password -> GitHub Secrets sync configuration
# Each entry maps a 1Password source to one or more GitHub repo secrets
# Managed by the sync-secrets workflow
#
# Format:
#   secrets:
#     - name: SECRET_NAME          # Default name when syncing to repos
#       source: op://vault/item/field  # 1Password secret reference
#       targets:
#         - repo: nsheaps/repo-name    # Target repo
#           name: OVERRIDE_NAME        # Optional: override the secret name
#
# Human setup required:
#   1. Create 1Password Service Account with read access to referenced vaults
#   2. Store token as org secret: OP_SERVICE_ACCOUNT_TOKEN
#   3. Create PAT with repo scope, store as org secret: SECRET_SYNC_PAT

secrets:
  # GitHub App for automation (releases, cross-repo PRs)
  - name: TEST_AUTOMATION_GITHUB_APP_ID
    source: op://heapsinfra/github--app--automation/AUTOMATION_GITHUB_APP_ID
    targets:
      - repo: nsheaps/.github
      # - repo: nsheaps/nsheaps
      # - repo: nsheaps/agent-team
      # - repo: nsheaps/ai-mktpl
      # - repo: nsheaps/op-exec
      # - repo: nsheaps/claude-utils
      # - repo: nsheaps/git-wt
      # - repo: nsheaps/gs-stack-status
      # - repo: nsheaps/homebrew-devsetup

  - name: TEST_AUTOMATION_GITHUB_APP_PRIVATE_KEY
    source: op://heapsinfra/github--app--automation/AUTOMATION_GITHUB_APP_PRIVATE_KEY
    targets:
      - repo: nsheaps/.github
      # - repo: nsheaps/nsheaps
      # - repo: nsheaps/agent-team
      # - repo: nsheaps/ai-mktpl
      # - repo: nsheaps/op-exec
      # - repo: nsheaps/claude-utils
      # - repo: nsheaps/git-wt
      # - repo: nsheaps/gs-stack-status
      # - repo: nsheaps/homebrew-devsetup
