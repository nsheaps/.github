name: "Sync Stars Push"
description: "Push stars configuration from YAML to GitHub Lists"

inputs:
  github-token:
    description: "GitHub token with user scope for star list management"
    required: true
  config-path:
    description: "Path to stars.yaml config file"
    required: false
    default: ".github/stars.yaml"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        corepack enable
        yarn install

    - name: Build
      shell: bash
      working-directory: ${{ github.action_path }}
      run: yarn build

    - name: Run sync
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        STARS_CONFIG_PATH: ${{ inputs.config-path }}
      run: node ${{ github.action_path }}/dist/index.js
