name: "Setup Environment"
description: "Set up Node.js, mise, corepack, and install dependencies"

runs:
  using: "composite"
  steps:
    - name: Setup mise
      uses: jdx/mise-action@v2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Enable and install corepack
      shell: bash
      run: |
        corepack enable
        corepack install

    - name: Install dependencies
      shell: bash
      run: yarn install
