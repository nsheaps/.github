name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yaml'
  workflow_dispatch:

permissions:
  contents: read

env:
  LABEL_SYNC_VERSION: "3.0.0"

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    env:
      LABEL_SYNC_ARGS: --labels .github/labels.yaml --allow-added-labels
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate as GitHub App
        id: auth
        uses: nsheaps/github-actions/.github/actions/github-app-auth@64ffafd33c5b691d0420c4f190b76310af8206d0
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Install tools via mise
        uses: jdx/mise-action@v2

      - name: Install github-label-sync
        run: npm install -g github-label-sync@${{ env.LABEL_SYNC_VERSION }}

      - name: Sync labels to all repos
        uses: qoomon/actions--parallel-steps@v1
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        with:
          steps: |
            - id: ai-mktpl
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/ai-mktpl
            - id: agent-team
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/agent-team
            - id: op-exec
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/op-exec
            - id: dot-org
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/.org
            - id: dot-claude
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/.claude
            - id: github-actions
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/github-actions
            - id: iac
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/iac
            - id: renovate-config
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/renovate-config
            - id: homebrew-devsetup
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/homebrew-devsetup
            - id: aitkit
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/aitkit
            - id: dot-github
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/.github
            - id: claude-utils
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/claude-utils
            - id: git-wt
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/git-wt
            - id: gs-stack-status
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/gs-stack-status
            - id: workspaces
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/workspaces
            - id: ai-agent-jack
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/.ai-agent-jack
            - id: ai-agent-henry
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/.ai-agent-henry
            - id: ai-agent-pamela
              run: github-label-sync --access-token "$GITHUB_TOKEN" $LABEL_SYNC_ARGS nsheaps/.ai-agent-pamela
