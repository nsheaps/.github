name: Sync Secrets

on:
  push:
    branches: [main]
    paths:
      - ".github/secret-sync.yaml"
      - ".github/workflows/sync-secrets.yaml"
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate and read but don't sync)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate as GitHub App
        id: auth
        uses: nsheaps/github-actions/.github/actions/github-app-auth@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Sync 1Password secrets to GitHub${{ env.DRY_RUN == 'true' && ' (dry-run)' || ''}}
        # Pin to commit SHA for supply chain security — update when action changes
        uses: nsheaps/github-actions/.github/actions/1password-secret-sync@main
        with:
          config-file: .github/secret-sync.yaml
          op-service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          github-token: ${{ steps.auth.outputs.token }}
          dry-run: ${{ env.DRY_RUN }}
