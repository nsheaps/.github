name: Sync Secrets

on:
  push:
    branches: [main]
    paths:
      - ".github/secret-sync.yaml"
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate and read but don't sync)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync 1Password secrets to GitHub
        # Pin to commit SHA for supply chain security — update when action changes
        uses: nsheaps/github-actions/.github/actions/1password-secret-sync@81a78458604d30256c9ebea186c970d09e256ba1
        with:
          config-file: .github/secret-sync.yaml
          op-service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          github-token: ${{ secrets.SECRET_SYNC_PAT }}
          dry-run: ${{ inputs.dry_run || 'false' }}
