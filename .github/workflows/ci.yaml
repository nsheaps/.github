name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install Node dependencies
        run: yarn install

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Use mise tasks for consistent local/CI behavior
      - name: Run TypeScript checks
        run: mise run check

      - name: Validate Ansible sync config
        run: mise run validate-sync-config

      - name: Run Ansible linting
        run: mise run ansible-lint
