name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Enable corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: yarn install

      # Use justfile for consistent local/CI behavior
      - name: Run checks
        run: just check
