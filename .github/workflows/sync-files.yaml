name: Sync Files

on:
  push:
    branches: [main]
    paths:
      - 'ansible/config/sync-files.yml'
      - 'ansible/templates/**'
      - '.github/workflows/sync-files.yaml'
  pull_request:
    paths:
      - 'ansible/config/sync-files.yml'
      - 'ansible/templates/**'
      - '.github/workflows/sync-files.yaml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes only)'
        type: boolean
        default: true
      force:
        description: 'Force sync all files (ignore unchanged)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  sync:
    name: Sync Files to Repositories
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate as GitHub App
        id: auth
        uses: nsheaps/github-actions/.github/actions/github-app-auth@64ffafd33c5b691d0420c4f190b76310af8206d0
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd ansible && ansible-galaxy collection install -r requirements.yml

      - name: Validate sync configuration
        run: mise run validate-sync-config

      - name: Run file sync
        id: sync
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          # Dry run for PRs, actual sync for push/dispatch
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DRY_RUN="-e dry_run=true"
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN="-e dry_run=true"
          else
            DRY_RUN=""
          fi

          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE="-e force_sync=true"
          else
            FORCE=""
          fi

          cd ansible
          # Capture output for PR comment
          EXIT_CODE=0
          OUTPUT=$(ansible-playbook playbooks/sync-files.yml \
            -i inventory/production.yml \
            -e github_auth_method=token \
            $DRY_RUN \
            $FORCE 2>&1) || EXIT_CODE=$?

          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          exit $EXIT_CODE

      - name: Post dry run results
        if: github.event_name == 'pull_request' && always()
        uses: ./.github/actions/upsert-comment
        with:
          comment-tag: file-sync-dry-run
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🔄 File Sync Dry Run Results

            <details>
            <summary>Ansible Output</summary>

            ```
            ${{ steps.sync.outputs.output }}
            ```

            </details>

            ---
            *This is a dry run preview. Files will be synced when merged to main.*
