name: Sync Files

on:
  push:
    branches: [main]
    paths:
      - 'ansible/config/sync-files.yml'
      - 'ansible/templates/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes only)'
        type: boolean
        default: false
      force:
        description: 'Force sync all files (ignore unchanged)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync:
    name: Sync Files to Repositories
    runs-on: ubuntu-latest
    # Only run if GitHub App is configured
    if: ${{ vars.SYNC_APP_CONFIGURED == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd ansible && ansible-galaxy collection install -r requirements.yml

      - name: Validate sync configuration
        run: mise run validate-sync-config

      - name: Run file sync
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS -e dry_run=true"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            FLAGS="$FLAGS -e force_sync=true"
          fi

          cd ansible
          ansible-playbook playbooks/sync-files.yml \
            -i inventory/production.yml \
            -e github_auth_method=token \
            $FLAGS
